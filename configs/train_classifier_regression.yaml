model:
  name: "resnet18"
  pretrained: true
  num_classes: 4
  dropout: 0.3
  freeze_backbone_epochs: 0

dataset:
  data_root: dataset/limuc_cleaned
  image_size: 224
  num_workers: 24
  pin_memory: true

logging:
  project_name: "mes_judge_regression"
  group_name: "judge"
  experiment_name: "judge_regression"
  log_every_n_steps: 10
  save_top_k: 3
  monitor_metric: "val/rmse"
  monitor_mode: "min"
  offline: false

training:
  batch_size: 32
  max_epochs: 30
  learning_rate: 1e-4
  weight_decay: 1e-4
  optimizer: "adamw"
  scheduler: "cosine"
  scheduler_params:
    T_max: 30
    eta_min: 1e-6
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

augmentation:
  train:
    random_horizontal_flip: 0.5
    random_vertical_flip: 0.5
    random_rotation: 5
    color_jitter:
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
    random_affine:
      degrees: 5
      translate: [0.1, 0.1]
      scale: [0.9, 1.1]
    random_erasing: 0.2
    gaussian_blur:
      kernel_size: 5
      sigma: [0.1, 2.0]
      probability: 0.3
    random_resized_crop:
      scale: [0.8, 1.0]
      ratio: [0.9, 1.1]
  eval:
    resize: 256
    center_crop: 224

checkpoint:
  dirpath: "outputs/classifier_regression"
  filename: "{epoch:02d}-{val_rmse:.4f}"
  save_last: true

early_stopping:
  patience: 15
  min_delta: 0.001

hardware:
  accelerator: "auto"
  devices: 1
  precision: "16"

seed: 42
